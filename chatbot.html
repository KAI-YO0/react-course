<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>

  <body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <!-- import -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    
    <script type="text/babel">

        function ChatInput() {
            return (
                <>
                    <input 
                        placeholder="Send a Message to Chatbot" 
                        size="30" 
                    />
                    <button>Send</button>
                </>
            );
        }

        function ChatMessage({message, sender}) {
            // const { message, sender } = props;

            return (
                <div>
                    {
                        sender === "bot" && (
                        <img src="src/robot.png" width="50" />
                    )}
                    {message}
                    {sender === "user" && (
                        <img src="src/user.png" width="50" />         
                    )}
                </div>
            );
            
        }

        function App() {
            return (
                <>
                    <ChatInput />
                    <ChatMessage 
                        message="hello chatbot" s
                        ender="user" 
                    />
                    <ChatMessage 
                        message="Hello! How can I help you?" 
                        sender="bot" 
                    />
                    <ChatMessage 
                        message="give me a fucking today date bitch" 
                        sender="user" 
                    />
                    <ChatMessage 
                        message={`Today's date is ${dayjs().format('YYYY-MM-DD')}`} 
                        sender="bot" 
                    />
                </>
            );
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);

    </script>
  </body>

</html>
